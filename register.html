<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/styles.css">
        <title></title>
    </head>
    <body onload="localStorage.clear()">
        <header class="grid">
            <h1>FilmForum</h1>
            <nav>
                <a href="index.html">Homepage</a>
                <a href="movie.html">Movie</a>
                <a href="profile.html">Profile</a>
            </nav>
        </header>
        <main>
            <section class="container-form-outer">
                <div class="container-form-inner">
                    <form method="POST" id="register-form-data">
                    <fieldset class="container-form-field">
                        <legend>Create an Account<br>Join FilmForum Today!</legend>
                        <label for="register-user">Username</label>
                        <input type="text" id="register-user" minlength="3" maxlength="16" required>
                        <label for="register-pass">Password</label>
                        <input type="password" id="register-pass" minlength="3" maxlength="20" required>
                        <label for="confirm-pass">Confirm Password</label>
                        <input type="password" id="confirm-pass" minlength="3" maxlength="20" required>
                        <input type="submit" value="Submit">
                    </fieldset>
                </form>
                </div>
                <p class="text-center mt-2">Already have an account?</p>
                <p class="text-center">Login <a href="login.html">here.</a></p>
            </section>
        </main>
    </body>
    <script src="js/script.js"></script>
</html>

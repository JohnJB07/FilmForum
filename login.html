<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/script.js"></script>
</head>
    <body>
        <!-- Login Form -->
        <header class="grid">
            <h1>FilmForum</h1>
            <nav>
                <a href="index.html">Homepage</a>
                <a href="movie.html">Movies</a>
                <a href="profile.html">Profile</a>
                <a href="login.html">Login</a>
            </nav>
        </header>
        <main>
            <section class="form-center">
                <div class="form-font">
                    <div class="form-data">
                        <!-- 
                            Do not submit it will crash the page 
                            there is no way for the form to submit
                            to a server/databse so submitting will
                            just crash the server
                        -->
                        <form id="form-data" method="POST" action="">
                            <fieldset class="login-form">
                                <legend>Log In</legend>
                                <label for="login-username">Username</label>
                                <input minlength="3" maxlength="20" id="login-username" type="text" required>
                                <label for="login-password">Password</label>
                                <input id="login-password" type="password" required>
                                <input type="submit" value="Submit">
                            </fieldset>
                        </form>
                    </div>
                </div>
                <p style="text-align: center;">Dont have an account? <a href="register.html">Sign up Here</a></p>
            </section>
        </main>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/styles.css">
        <title>Login</title>
    </head>
    <body onload="localStorage.clear()">
        <header class="grid">
            <h1>FilmForum</h1>
            <nav>
                <a href="index.html">Homepage</a>
                <a href="movie.html">Movie</a>
                <a href="profile.html">Profile</a>
            </nav>
        </header>
        <main>
            <section class="container-form-outer">
                <div class="container-form-inner">
                    <form method="GET" id="login-form-data">
                    <fieldset class="container-form-field">
                        <legend>Login</legend>
                        <label for="login-user">Username</label>
                        <input type="text" id="login-user" minlength="3" maxlength="16" required>
                        <label for="login-pass">Password</label>
                        <input type="password" id="login-pass" minlength="3" maxlength="20" required>
                        <input type="submit" value="Submit">
                    </fieldset>
                </form>
                </div>
                <p>Dont have an account?</p>
                <p>Sign up <a href="register.html">here.</a></p>
            </section>
        </main>
    </body>
    <script src="js/script.js"></script>
</html>
